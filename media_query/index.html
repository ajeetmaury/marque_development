<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: hotpink;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box{
            background-color: aqua;
            color: white;
            height: 100px;
            width: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            border-radius: 20px;
        }

        /* Media Query */
        @media (max-width: 700px) or (max-height: 400px) {
            .container{
                background-color: red;
            }
            .box{
                background-color: green;
                font-size: 16px;
                font-weight: 800;
                color: hotpink;
                border-radius: 50%;
                width: 200px;
                height: 200px;
            }
        }

        @media  {
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"><p>Happy Holi</p></div>
    </div>
</body>
</html>
