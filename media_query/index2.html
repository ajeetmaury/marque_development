<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: magenta;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box{
            height: 200px;
            width: 200px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid black;
            margin: 5px;
        }

        @media (max-width: 600px) {
            .container{
                flex-direction: column;
            }
            .box{
                height: 150px;
                width: 150px;
            }
            .box1{
                background-color: mediumorchid;
            }
            .box2{
                background-color: rgb(85, 182, 211);
            }
            .box3{
                background-color: rgb(242, 146, 11);
            }
            .box4{
                background-color: rgb(152, 211, 85);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box1">Box1</div>
        <div class="box box2">Box2</div>
        <div class="box box3">Box3</div>
        <div class="box box4">Box4</div>
    </div>
</body>
</html>
