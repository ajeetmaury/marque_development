<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{

        .container{

<script>
    let getVar = document.querySelector("h1");
    getVar.innerHTML = "ReactJs";
    getVar.style.color = "orangered"
    
    document.querySelector("h4").style.color = "green";
    document.querySelector("h4").innerText = "Complete all topic"

    let getAccess = document.querySelector(".container");
    getAccess.style.cssText = "color : green; background : orangered; font-size : 16px; width : 200px; border-radius : 10px ;border : 2px solid red;"

    // change class
    getAccess.classList.add("active");
    getAccess.classList.remove("active");

    getAccess.classList.contains("active");

    // create element
    const div = document.createElement("div");
    div.innerText = "Hello";
