<script>
    let n = 30;
    for(let i=1;i<=n;i++){
        if(i==13){
            continue;
        }

        if(i==25){
            break;
        }
        if(i%3==0 && i%5==0){
            console.log("FizzBuzz");
        }else if(i % 3==0){
            console.log("Fizz");
        }else if(i % 5 ==0){
            console.log("Buzz");
        }else{
            console.log(i);
        }
    }
</script>
