<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = 1;
        switch(num){
            case 1:
                console.log("Sun");
                break
            case 2:
                console.log("Mon");
                break;
            case 3:
                console.log("Tue");
                break;
            case 4:
                console.log("Wed");
                break;
            case 5:
                console.log("Thu");
                break;
            case 6:
                console.log("Fri");
                break;
            case 7:
                console.log("Sat");
                break;
            default :
                console.log("Invalid Move Pls Correct your's Number");
        }
    </script>
</body>
</html>
