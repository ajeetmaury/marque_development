<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            height: 500px;
            width: 800px;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }
        .a{
            grid-column: 1/3;
            grid-row: 1/2;
            background: blue;
        }
        .b{
            grid-row: 1/3;
            grid-column: 3/4;
            background: purple;
        }
        .c{
            grid-column: 4/5;
            grid-row: 1/2;
            background: green;
        }
        .d{
            grid-column: 1/3;
            grid-row: 2/3;
            background: orangered;
        }
        .e{
            grid-column: 1/-1;
            grid-row: 3/4;
            background: skyblue;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="a"></div>
        <div class="b"></div>
        <div class="c"></div>
        <div class="d"></div>
        <div class="e"></div>
    </div>
</body>
</html>
