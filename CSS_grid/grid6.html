<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .section{
            height: 600px;
            /* width: 800px; */
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: repeat(3,1fr);
            grid-gap: 10px;
        }
        .item1{
            grid-row: 1/2;
            grid-column: 1/4;
            background-color: red;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .item2{
            grid-row: 2/3;
            grid-column: 1/2;
            background-color: purple;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;

        }
        .item3{
            grid-row: 2/3;
            grid-column: 2/4;
            background-color: green;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .item4{
            grid-row: 3/4;
            grid-column: 1/4;
            background-color: yellow;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body>
    <div class="section">
        <div class="item1"><h3>Header</h3></div>
        <div class="item2"><h3>main</h3></div>
        <div class="item3"><h3>aside</h3></div>
        <div class="item4"><h3>footer</h3></div>
    </div>
</body>
</html>
