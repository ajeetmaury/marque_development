<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: repeat(4,1fr);
            grid-template-rows: 60px 600px 100px;
            grid-template-areas: 
            "Header     Header      Header      Header"
            "Nevigation     Con     Con     Sidebar"
            "Footer     Footer      Footer      Footer";
        }
        .item{
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            border-radius: 15px;
            background-color: rgb(58, 48, 121);
        }
        .item1{
            grid-area: Header;
            border: 5px solid white;
        }
        .item2{
            grid-area: Nevigation;
            border: 5px solid white;
        }
        .item3{
            grid-area: Con;
            border: 5px solid white;
        }
        .item4{
            grid-area: Sidebar;
            border: 5px solid white;
        }
        .item5{
            grid-area: Footer;
            border: 5px solid white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">Header</div>
        <div class="item item2">Nevigation</div>
        <div class="item item3">Content</div>
        <div class="item item4">Sidebar</div>
        <div class="item item5">Footer</div>
    </div>
</body>
</html>
