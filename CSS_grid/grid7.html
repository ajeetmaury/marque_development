<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            /* height: 800px; */
            /* width: 400px; */
            grid-gap: 5px;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: 150px 250px 250px 150px;

        }
        .item{
            background-color: green;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            font-weight: 800;
            color: white;
        }

        .item1{
            grid-column: 1/4;
            grid-template-rows: 1/2;
        }

        .item2{
            grid-column: 1/2;
            grid-row: 2/4;
        }

        .item3{
            grid-column: 2/4;
            grid-row: 2/3;
        }
        .item4{
            grid-column: 2/3;
            grid-row: 3/4;
        }
        .item5{
            grid-column: 3/4;
            grid-row: 3/4;
        }
        .item6{
            grid-column: 1/4;
            grid-row: 4/5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">Header</div>
        <div class="item item2">Nevigation</div>
        <div class="item item3">Main</div>
        <div class="item item4">Lowerleft</div>
        <div class="item item5">Lowerright</div>
        <div class="item item6">Footer</div>
    </div>
</body>
</html>
