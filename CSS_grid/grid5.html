<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 600px;
            width: 800px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }
        .item{
            height: 60px;
            width: 60px;
            background: maroon;
        }
        .item2{
            align-self: start;
            justify-self: center;
        }
        .item3{
            align-self: end;
            justify-self: center;
        }
        .item4{
            align-self: start;
            justify-self: end;
        }
        .item5{
            align-self: center;
            justify-self: start;
        }
        .item6{
            align-self: center;
            justify-self: start;
        }
        .item8{
            align-self: center;
            justify-self: end;
        }
        .item13{
            align-self: end;
            justify-self: start;
        }
        .item16{
            align-self: end;
            justify-self: end;
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="item item1"></div>
        <div class="item item2"></div>
        <div class="item item3"></div>
        <div class="item item4"></div>
        <div class="item item5"></div>
        <div class="item item2"></div>
        <div class="item item3"></div>
        <div class="item item8"></div>
        <div class="item item5"></div>
        <div class="item item2"></div>
        <div class="item item3"></div>
        <div class="item item8"></div>
        <div class="item item13"></div>
        <div class="item item2"></div>
        <div class="item item3"></div>
        <div class="item item16"></div>
    </div>
</body>
</html>
