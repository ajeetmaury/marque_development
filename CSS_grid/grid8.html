<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            height: 750px;
            gap: 5px;
            grid-template-columns: repeat(6,1fr);
            grid-template-rows: repeat(6,1fr);
        }
        .item{
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: white;
        }
        .item1{
            grid-row: 1/3;
            grid-column: 1/5;
            background: rgb(58, 58, 222);
        }
        .item3{
            grid-row: 2/4;
            grid-column: 4/6;
            background: rgb(9, 200, 9);
        }
        .item4{
            grid-row: 1/2;
            grid-column: 5/6;
            background: hotpink;
        }
        .item5{
            grid-row: 1/2;
            grid-column: 6/7;
            background-color: hotpink;
        }
        .item6{
            grid-row: 2/3;
            grid-column: 6/7;
            background-color: hotpink;
        }
        .item2{
            grid-row: 3/7;
            grid-column: 1/7;
            background-color: rgb(239, 239, 32);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">1</div>
        <div class="item item2">2</div>
        <div class="item item3">3</div>
        <div class="item item4">4</div>
        <div class="item item5">5</div>
        <div class="item item6">6</div>
    </div>
</body>
</html>
