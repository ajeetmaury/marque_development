<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<style>
    *{
        margin: 0;
        box-sizing: border-box;
    }

    body{
        background-color: black;
    }

    .container{
        background-color: rgb(243, 238, 238);
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr 1fr 1fr;
        /* grid-template-rows: 600px; */
        padding: 20px;
        background-color: black;
        height: 100vh;
    }

    .item img{
        width: 450px;
        border-radius: 20px;
        object-fit: cover;
    }
    h1{
        color: white;
        font-family: "Goudy Bookletter 1911", sans-serif;
        text-align: center;
        margin: 20px;
        font-weight: 900;
        font-size: 35px;
        line-height: 1.5;
    }
    span{
        background-color: white;
        color: black;
        border-radius: 5px;
        padding: 5px 10px 5px 10px;
        font-weight: 900;
        font-size: 20px;
    }

</style>
<body>
    <h1>IFTTT <span>Pro</span> and <span>Pro+</span><br> Make your Applets more <br>powerful</h1>
    <div class="container">
        <div class="item"><img src="https://web-assets.ifttt.com/builds/assets/more-applets@2x-CkkP9gqI.png" alt=""></div>
        <div class="item"><img src="https://web-assets.ifttt.com/builds/assets/multiple-actions@2x-DCoVVW2E.png" alt=""></div>
        <div class="item"><img src="https://web-assets.ifttt.com/builds/assets/exclusive-benefits@2x-MGbw9k7E.png" alt=""></div>
    </div>
</body>
</html>
