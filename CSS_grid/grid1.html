<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            height: 500px;
            width: 800px;
            border: 2px solid black;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            /* 200px 200px 200px 200px 200px 200px; */
            grid-template-rows: repeat(4, 1fr);
            grid-gap: 5px;
        }
        .box1{
            background-color: yellow;
            grid-column: 1/3;
            grid-row: 1/3;
            border-radius: 5px;
        }
        .box2{
            grid-row: 3/5;
            grid-column: 1/3;
            background: #e3088c;
            border-radius: 5px;
        }
        .box3{
            grid-row: 1/3;
            grid-column: 3/5;
            background: red;
            border-radius: 5px;
        }
        .box4{
            grid-row: 3/5;
            grid-column: 3/5;
            background: green;
            border-radius: 5px;
        }
        .box5{
            grid-row: 2/4;
            grid-column: 2/4;
            background: maroon;
            border-radius: 5px;
            flex
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box1">1</div>
        <div class="box2">2</div>
        <div class="box3">3</div>
        <div class="box4">4</div>
        <div class="box5">5</div>
        <!-- <div class="box6">6</div> -->
        <!-- <div class="box7">7</div>
        <div class="box8">8</div>
        <div class="box9">9</div> -->
    </div>
</body>
</html>
