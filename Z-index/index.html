<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --bg-primary : pink;
            --bg2-primary : red;
            --bg3-primary : rgb(50, 231, 50);
            --bg4-primary : yellow;
            --text-color:  green;
            --div-height: 100px;
            --c-height: 400px;
            --div-width: 100px;
            --c-width: 600px;
            --margin: 20px;
        }
        .container{
            border: 2px solid black;
            width: var(--c-width);
            height: var(--c-height);
        }
        .item{
            width: var(--div-width);
            height: var(--div-height);
            border-radius: 10px;
            margin: var(--margin);
            position: relative;
        }

        .item1{
            /* z-index: 1; */
            background-color: var(--bg-primary);
            /* bottom: ; */
        }
        .item2{
            z-index: 2;
            background-color: var(--bg2-primary);
            top: -40px;
            left: 40px;
        }
        .item3{
            z-index: 2;
            background-color: var(--bg3-primary);
            top: -80px;
            left: 80px;
        }
        .item4{
            /* position: relative; */
            z-index: 2;
            background-color: var(--bg4-primary);
            top: -120px;
            left: 120px;
            /* bottom: 0;
            right: 0; */
        }

        button{
            width: 120px;
            height: 40px;
        }
        button:hover{
            background-color: greenyellow;
        }
        button:active{
            background-color: skyblue;
        }
        
        .click:focus{
            background-color: red;
        }
        a:visited{
            color: red;
        }

        .items :nth-child(even){
            color: red;
        }

        .items :first-child{
            color: blue;
        }
/* 
        ::after
        ::before
        ::placeholder
        ::selection
         */

        .btn{
            width: 200px;
            height: 100px;  
            transition: border-radius 3s ease;
         }
         .btn1:hover{
            background-color: blue;
        }
        .btn2:hover{
            border-radius: 30px;
        }
        .btn3:hover{
            transform: translate(200px, 300px);
        }
        .btn4:hover{
            transform: scale(1.5); 
        }
        .btn5:hover{
            transform: rotate(45deg); 
        }
        .btn6:hover{
            transform: skew(10deg); 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">4</div>
        <div class="item item2">3</div>
        <div class="item item3">2</div>
        <div class="item item4">1</div>
    </div>
    <button>Click me</button>
    <button class="click">Click me again</button>
    <a href="https://www.google.com/">google</a>

    <div class="items">
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
        <p>Lorem ipsum dolor sit amet.</p>
    </div>

    <button class="btn btn1">Button</button>
    <button class="btn btn2">Button</button>
    <button class="btn btn3">Button</button>
    <button class="btn btn4">Button</button>
    <button class="btn btn5">Button</button>

</body>
</html>
